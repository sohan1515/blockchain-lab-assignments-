<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPFS File Upload - Assignment 4</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    form {
      margin-bottom: 20px;
    }
    input[type="file"] {
      margin-bottom: 10px;
    }
    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    #result {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>IPFS File Upload Interface</h1>
  <p>Choose a file to upload to IPFS (InterPlanetary File System)</p>

  <form id="uploadForm">
    <input type="file" id="fileInput" required>
    <br>
    <button type="submit">Upload to IPFS</button>
  </form>

  <div id="result"></div>

  <script src="app.js"></script>
</body>
</html>
